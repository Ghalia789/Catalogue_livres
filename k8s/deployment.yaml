apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-livres
  namespace: catalogue-livres
  labels:
    app: catalogue-livres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue-livres
  template:
    metadata:
      labels:
        app: catalogue-livres
    spec:
      containers:
        - name: catalogue-livres
          image: farah089/catalogue-livres:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: catalogue_livre.settings